<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIBEN ICT Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
width:95%;
max-width:900px;
padding:30px;
border-radius:25px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(25px);
-webkit-backdrop-filter: blur(25px);
border:1px solid rgba(255,255,255,0.2);
box-shadow:0 25px 50px rgba(0,0,0,0.5);
animation:fadeIn 1s ease;
max-height:90vh;
overflow:hidden;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

h1{
text-align:center;
margin-bottom:15px;
font-weight:700;
}

.timer{
text-align:right;
font-weight:600;
font-size:18px;
margin-bottom:15px;
transition:0.3s;
}

.question{
font-size:18px;
margin-bottom:15px;
}

.options button{
width:100%;
margin:8px 0;
padding:12px;
border:none;
border-radius:15px;
cursor:pointer;
background:rgba(255,255,255,0.15);
color:white;
font-weight:500;
backdrop-filter:blur(15px);
transition:0.3s;
opacity:0;
}

.options button:hover{
background:rgba(255,255,255,0.3);
transform:scale(1.03);
}

.left{animation:slideLeft 0.6s forwards;}
.right{animation:slideRight 0.6s forwards;}

@keyframes slideLeft{
from{opacity:0;transform:translateX(-50px);}
to{opacity:1;transform:translateX(0);}
}

@keyframes slideRight{
from{opacity:0;transform:translateX(50px);}
to{opacity:1;transform:translateX(0);}
}

.hidden{display:none;}

.result{
margin-top:20px;
max-height:60vh;
overflow-y:auto;
padding-right:10px;
scroll-behavior:smooth;
}

.result::-webkit-scrollbar{
width:6px;
}
.result::-webkit-scrollbar-thumb{
background:rgba(255,255,255,0.3);
border-radius:10px;
}

.correct{background:#00c853 !important;}
.wrong{background:#d50000 !important;}

button.action{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:600;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
}

button.action:hover{
transform:scale(1.05);
}

.start-screen{
text-align:center;
}

input{
padding:12px;
border-radius:12px;
border:none;
width:100%;
margin-bottom:15px;
outline:none;
}

</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="container">

<h1>UNIBEN ICT Quiz</h1>

<div id="startScreen" class="start-screen">
<input type="text" id="studentName" placeholder="Enter Your Name">
<button class="action" onclick="startQuiz()">Start Quiz</button>
</div>

<div id="quizSection" class="hidden">
<div class="timer" id="timer">03:00</div>
<div id="quizBox">
<div class="question" id="question"></div>
<div class="options" id="options"></div>
</div>
</div>

<div class="result hidden" id="result"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
d:Math.random()*1
});
}

function drawParticles(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="rgba(255,255,255,0.4)";
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
ctx.fill();
});
particles.forEach(p=>{
p.y+=p.d;
if(p.y>canvas.height){
p.y=0;
p.x=Math.random()*canvas.width;
}
});
}
setInterval(drawParticles,30);
</script>

</body>
</html>
